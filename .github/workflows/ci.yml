name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # `npm ci` runs the `prepare` script, which builds dist via tsup.
      - run: npm ci

      - name: Verify package contracts
        run: npm run verify

  documentation-site:
    # The site consumes only the package's published exports, so a failure here
    # is a failure a real consumer would hit (ADR 0028). It runs as its own job
    # because `npm run verify` deliberately skips the framework build.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Install site dependencies
        run: npm ci
        working-directory: site

      - name: Fail if the vendored icon subset is stale
        # The subset is committed so builds need no network. This asserts it
        # still matches the icons the site renders instead of silently
        # refetching it.
        run: npm run generate:site-symbols
        env:
          M3E_SITE_OFFLINE: '1'

      - name: Build the documentation site
        run: npm run site:build
